<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Inject probe (no extension)</title>
    <style>
      /* Loads with zero network — proves this file opened in Chrome */
      body {
        margin: 0;
        border-top: 14px solid #0a0 !important;
        min-height: 100vh;
        box-sizing: border-box;
        font-family: system-ui, sans-serif;
        padding: 1rem;
      }
    </style>
    <!-- Same-repo file: works when opened via file:// or http://localhost/... -->
    <link rel="stylesheet" href="../squarespace/inject-probe.css" />
    <!-- Same CDN Super CSS Inject should use (raw /main/ can be stale on GitHub’s CDN) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/augustang/frontsite-stylesheets@main/squarespace/inject-probe.css"
    />
  </head>
  <body>
    <p>
      <strong>Green bar</strong> at the very top = this HTML loaded. <strong>Magenta inset</strong>
      around the viewport = probe CSS loaded (local file, jsDelivr, or both).
    </p>
    <p>
      If you see green but <em>no</em> magenta: avoid <code>file://</code> — from the
      <strong>repo root</strong> run <code>python3 -m http.server 8765</code>, then open
      <code>http://localhost:8765/debug/local-probe.html</code> in Chrome.
    </p>
  </body>
</html>
